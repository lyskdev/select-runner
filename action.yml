name: Select Runner
description: >
  Prefer a runner label you choose when at least one matching runner is online;
  fall back to another label otherwise (common case: self-hosted with a GitHub-hosted fallback).

inputs:
  preferred-runner-label:
    description: Label of the preferred runner (used when at least one online runner has this label)
    required: false
    default: self-hosted
  fallback:
    description: Runner label to use when no online runners match the preferred runner label
    required: false
    default: ubuntu-latest
  token:
    description: >
      GitHub token used to query the Actions API (needs actions:read permission)
    required: false
    default: ${{ github.token }}

outputs:
  runner:
    description: Resolved runner label to pass to runs-on
    value: ${{ steps.pick.outputs.runner }}

runs:
  using: composite
  steps:
    - name: Pick runner
      id: pick
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        LABEL: ${{ inputs['preferred-runner-label'] }}
        FALLBACK: ${{ inputs.fallback }}
      run: |
        set -euo pipefail

        api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100"

        if ! json=$(curl -fsS \
             -H "Authorization: Bearer ${GH_TOKEN}" \
             -H "Accept: application/vnd.github+json" \
             -H "X-GitHub-Api-Version: 2022-11-28" \
             "${api}"); then
          echo "::warning::Runner API request failed — using fallback: ${FALLBACK}"
          echo "runner=${FALLBACK}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        # Count runners that are online AND carry the requested label
        online=$(echo "${json}" | jq -r \
          --arg label "${LABEL}" \
          '[.runners[] | select(.status == "online") | select(.labels[].name == $label)] | length' \
          2>/dev/null || echo 0)

        # Guard against empty / non-numeric values
        case "${online}" in ''|*[!0-9]*) online=0 ;; esac

        if [ "${online}" -gt 0 ]; then
          echo "Preferred label '${LABEL}' online (${online} runner(s)) — using ${LABEL}"
          echo "runner=${LABEL}" >> "${GITHUB_OUTPUT}"
        else
          echo "No online runners with preferred label '${LABEL}' — using ${FALLBACK}"
          echo "runner=${FALLBACK}" >> "${GITHUB_OUTPUT}"
        fi
