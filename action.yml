name: Select Runner
description: >
  Prefer a runner label you choose when at least one matching runner is online;
  fall back to another label otherwise (common case: self-hosted with a GitHub-hosted fallback).
  Supports both repo-level and org-level runners.

inputs:
  preferred-runner-label:
    description: Label of the preferred runner (used when at least one online runner has this label)
    required: false
    default: self-hosted
  fallback:
    description: Runner label to use when no online runners match the preferred runner label
    required: false
    default: ubuntu-latest
  token:
    description: >
      GitHub token used to query the repo-level Actions API (needs actions:read permission).
      This is used to check for repo-level runners. Defaults to the automatic workflow token.
    required: false
    default: ${{ github.token }}
  runner-token:
    description: >
      GitHub token with org-level runner read access. When provided, the action also checks
      org-level runners if no repo-level runners match. Create a fine-grained PAT with
      "Organization self hosted runners: Read" permission, or a classic PAT with admin:org scope.
      Not required when runners are registered at the repo level.
    required: false
    default: ""

outputs:
  runner:
    description: Resolved runner label to pass to runs-on
    value: ${{ steps.pick.outputs.runner }}

runs:
  using: composite
  steps:
    - name: Pick runner
      id: pick
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        RUNNER_TOKEN: ${{ inputs['runner-token'] }}
        LABEL: ${{ inputs['preferred-runner-label'] }}
        FALLBACK: ${{ inputs.fallback }}
      run: |
        set -euo pipefail

        count_online_runners() {
          local json="$1"
          local count
          count=$(echo "${json}" | jq -r \
            --arg label "${LABEL}" \
            '[.runners[] | select(.status == "online") | select(.labels[].name == $label)] | length' \
            2>/dev/null || echo 0)
          # Guard against empty / non-numeric values
          case "${count}" in ''|*[!0-9]*) count=0 ;; esac
          echo "${count}"
        }

        fetch_runners() {
          local url="$1"
          local token="$2"
          curl -fsS \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${url}" 2>/dev/null
        }

        # --- 1. Check repo-level runners ---
        repo_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100"

        online=0
        if json=$(fetch_runners "${repo_api}" "${GH_TOKEN}"); then
          online=$(count_online_runners "${json}")
        else
          echo "::warning::Repo-level runner API request failed"
        fi

        if [ "${online}" -gt 0 ]; then
          echo "Preferred label '${LABEL}' online (${online} repo runner(s)) — using ${LABEL}"
          echo "runner=${LABEL}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        # --- 2. Check org-level runners (if runner-token is provided) ---
        if [ -n "${RUNNER_TOKEN}" ]; then
          org="${GITHUB_REPOSITORY%%/*}"
          org_api="${GITHUB_API_URL}/orgs/${org}/actions/runners?per_page=100"

          if json=$(fetch_runners "${org_api}" "${RUNNER_TOKEN}"); then
            online=$(count_online_runners "${json}")
          else
            echo "::warning::Org-level runner API request failed — check that runner-token has org runner read permission"
          fi

          if [ "${online}" -gt 0 ]; then
            echo "Preferred label '${LABEL}' online (${online} org runner(s)) — using ${LABEL}"
            echo "runner=${LABEL}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
        fi

        # --- 3. Fallback ---
        echo "No online runners with preferred label '${LABEL}' — using ${FALLBACK}"
        echo "runner=${FALLBACK}" >> "${GITHUB_OUTPUT}"
